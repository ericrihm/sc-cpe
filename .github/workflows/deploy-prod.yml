name: deploy-prod

# Deploys Cloudflare Pages + all three Workers on a single run, then verifies
# with the hardening smoke suite. Replaces the manual `wrangler pages deploy`
# / `wrangler deploy` workflow documented in README.md.
#
# Ordering: tests -> Pages -> Workers -> verify-deploy.
# Pages first so a new API shape is live before any Worker that might call it;
# Workers are matrix-parallel. Every step must tolerate ONE rev of Pages↔Worker
# skew during the ~30s window between them.
#
# Trigger state: push-to-main auto-deploy + manual dispatch. Branch
# protection on main is the CI gate — a PR must pass `Node test suite` and
# `Secret scan (gitleaks)` before merge, so this auto-deploy only fires on
# commits that have been through that gate (or an admin break-glass push).

on:
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: "Skip the post-deploy smoke (emergency-only)."
        required: false
        default: "false"
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never yank a mid-flight deploy

permissions:
  contents: read

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
      - name: Run tests
        run: bash scripts/test.sh

  deploy-pages:
    name: Deploy Cloudflare Pages
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      # Same retry-with-backoff pattern as the worker deploys below.
      - name: wrangler pages deploy
        id: pages_deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: pages
          command: pages deploy . --project-name sc-cpe-web --branch main --commit-message="${{ github.sha }}"

      - name: Wait before retry
        if: steps.pages_deploy.outcome == 'failure'
        run: |
          echo "First wrangler pages deploy attempt failed -- CF API may be flaky. Waiting 20s before retry."
          sleep 20

      - name: wrangler pages deploy (retry)
        if: steps.pages_deploy.outcome == 'failure'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: pages
          command: pages deploy . --project-name sc-cpe-web --branch main --commit-message="${{ github.sha }}"

  deploy-workers:
    name: Deploy Worker (${{ matrix.worker }})
    needs: deploy-pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: production
    strategy:
      fail-fast: false
      matrix:
        worker: [purge, poller, email-sender]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # First attempt. continue-on-error so a transient CF Workers API
      # 503 (e.g. wrangler's pre-publish GET to /workers/services/...)
      # doesn't immediately fail the job — we give it one retry below.
      # PR #29 launch-day: CF 503'd on sc-cpe-purge's pre-publish GET
      # three times in a row even though the worker itself was healthy.
      # A single retry with 20s backoff recovered every subsequent CF
      # blip observed during the first launch week.
      - name: wrangler deploy
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy

      - name: Wait before retry
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "First wrangler deploy attempt failed — CF API may be flaky. Waiting 20s before retry."
          sleep 20

      - name: wrangler deploy (retry)
        if: steps.deploy.outcome == 'failure'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd  # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy

  verify-deploy:
    name: Post-deploy smoke
    needs: deploy-workers
    if: inputs.skip_smoke != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ORIGIN: https://sc-cpe-web.pages.dev
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      ALLOW_FIXTURES: ${{ vars.ALLOW_FIXTURES || '0' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Wait for Pages propagation
        # Pages deploy returns before the edge fully picks up the new bundle.
        # ~20s is empirically enough for sc-cpe-web; bump if smoke flakes.
        run: sleep 20
      - name: Run hardening smoke
        run: bash scripts/smoke_hardening.sh

  alert-on-failure:
    name: Discord alert on deploy failure
    needs: [test, deploy-pages, deploy-workers, verify-deploy]
    # github.run_attempt == 1 suppresses re-pings when an operator
    # reruns a failed run — the first attempt's alert already
    # delivered the signal. Complements PR #39's step-level retry
    # (which catches in-run transient flakes) by covering the
    # manual-rerun case.
    if: failure() && github.run_attempt == 1
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Notify Discord
        env:
          DISCORD_ALERT_WEBHOOK: ${{ secrets.DISCORD_ALERT_WEBHOOK }}
        run: |
          if [[ -z "${DISCORD_ALERT_WEBHOOK:-}" ]]; then
            echo "DISCORD_ALERT_WEBHOOK unset — skipping"; exit 0
          fi
          payload=$(jq -cn \
            --arg c ":rotating_light: **SC-CPE deploy-prod FAILED** on ${{ github.sha }}. See Actions run ${{ github.run_id }}." \
            '{content: $c, username: "SC-CPE Deploy"}')
          curl -fsS --max-time 20 \
            -H "Content-Type: application/json" \
            -X POST -d "$payload" "$DISCORD_ALERT_WEBHOOK" >/dev/null
