name: rescan-chat

# Retries attendance crediting for streams the live poller missed, using
# YouTube's chat replay. Runs daily at 16:00 UTC (after all shows end)
# and can be triggered manually for a specific video.
#
# Requires the channel owner to have chat replay enabled in YouTube Studio
# (Settings → Community → Defaults → Live chat replay).

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      video_id:
        description: "YouTube video ID to rescan (blank = all flagged)"
        required: false
      dry_run:
        description: "Dry run (no writes)"
        type: boolean
        default: false

concurrency:
  group: rescan-chat
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rescan:
    name: Rescan chat replays
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install chat-downloader requests

      - name: Run rescan
        run: |
          ARGS=""
          if [ -n "${{ inputs.video_id }}" ]; then
            ARGS="--video-id ${{ inputs.video_id }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/rescan_chat.py $ARGS
