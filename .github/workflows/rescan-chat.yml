name: rescan-chat

# Retries attendance crediting for streams the live poller missed.
# Primary mode: Discord (reads #live-chat channel history).
# Fallback mode: YouTube (requires chat replay enabled by channel owner).
#
# Runs daily at 16:00 UTC (after all shows end).

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Source: discord (default) or youtube"
        required: false
        default: "discord"
      video_id:
        description: "YouTube video ID to rescan (blank = all flagged)"
        required: false
      date:
        description: "Specific date to rescan (YYYY-MM-DD)"
        required: false
      dry_run:
        description: "Dry run (no writes)"
        type: boolean
        default: false

concurrency:
  group: rescan-chat
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rescan:
    name: Rescan chat
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests chat-downloader

      - name: Run rescan
        run: |
          MODE="${{ inputs.mode || 'discord' }}"
          ARGS="--${MODE}"
          if [ -n "${{ inputs.video_id }}" ]; then
            ARGS="$ARGS --video-id ${{ inputs.video_id }}"
          fi
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/rescan_chat.py $ARGS
