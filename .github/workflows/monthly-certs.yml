name: monthly-certs

# Generates, signs, uploads, records, and emails monthly CPE certificates.
#
# Schedule rationale:
#   - 03:00 UTC on the 1st of month: primary run for prior calendar month.
#   - 03:00 UTC on the 2nd and 3rd of month: idempotent retry runs. If the
#     1st failed partway, these safety runs will pick up users who were skipped
#     or errored (the INSERT into certs is guarded by the partial-unique-index
#     UNIQUE(user_id, period_yyyymm) WHERE state != 'revoked', so already-issued
#     users are detected and skipped cleanly).
#
# Manual runs: use workflow_dispatch with period_yyyymm=YYYYMM to regenerate
# for a specific month (e.g. backfills). Still idempotent.

on:
  schedule:
    - cron: "0 3 1 * *"
    - cron: "0 3 2 * *"
    - cron: "0 3 3 * *"
  workflow_dispatch:
    inputs:
      period_yyyymm:
        description: "Target period in YYYYMM (e.g. 202603). Leave blank for prior month."
        required: false
        default: ""

concurrency:
  group: monthly-certs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate:
    name: Generate monthly certificates
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Cloudflare
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      # R2
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      CERT_R2_BUCKET: sc-cpe-certs
      # Signing
      PDF_SIGNING_KEY_P12_BASE64: ${{ secrets.PDF_SIGNING_KEY_P12_BASE64 }}
      PDF_SIGNING_KEY_PASSWORD: ${{ secrets.PDF_SIGNING_KEY_PASSWORD }}
      # Email
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      # Using signalplane.co as the verified Resend sender domain to avoid
      # re-verifying simplycyber.io. Reply-to still points at SC.
      FROM_EMAIL: "Simply Cyber CPE <certs@signalplane.co>"
      # Branding / routing
      ISSUER_NAME: "Simply Cyber LLC"
      # Apex cpe.simplycyber.io is not yet wired in DNS; until then both
      # verify and download URLs go through the Pages production alias so
      # recipients land on a domain that actually resolves.
      VERIFY_BASE_URL: "https://sc-cpe-web.pages.dev/verify.html"
      DOWNLOAD_BASE_URL: "https://sc-cpe-web.pages.dev/api/download"
      # Forwarded manual-dispatch input; empty on cron.
      PERIOD_YYYYMM: ${{ github.event.inputs.period_yyyymm }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/certs/requirements.txt

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-dejavu-core fonts-liberation

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/certs/requirements.txt

      - name: Run generator
        working-directory: services/certs
        run: |
          python generate.py
