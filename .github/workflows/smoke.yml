name: smoke

# Runs the hardening smoke suite (scripts/smoke_hardening.sh) against
# production once per hour, and on every push to main as a post-deploy
# sanity check. This is the "synthetic canary" — it exercises the real
# admin auth / CSRF / rate-limit paths end-to-end and alerts if the site
# has silently regressed between livestreams.
#
# The smoke script is read-only except for one audit-log row per invocation
# (admin users search). That's intentional — the audit entry doubles as
# the canary heartbeat ("admin search from GH-Actions ran at T").

on:
  schedule:
    - cron: "0 * * * *"  # hourly on the hour
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke
  cancel-in-progress: false  # let hourly runs complete independently

jobs:
  smoke:
    name: Hardening smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ORIGIN: ${{ vars.SMOKE_ORIGIN }}  # e.g. https://cpe.simplycyber.io
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      DISCORD_ALERT_WEBHOOK: ${{ secrets.DISCORD_ALERT_WEBHOOK }}
      ALLOW_FIXTURES: ${{ vars.ALLOW_FIXTURES || '0' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run smoke suite
        id: smoke
        run: |
          : "${ORIGIN:?SMOKE_ORIGIN repo var not set}"
          : "${ADMIN_TOKEN:?ADMIN_TOKEN repo secret not set}"
          bash scripts/smoke_hardening.sh
      - name: Write canary heartbeat
        # Written immediately after smoke passes — the heartbeat means
        # "last green run". Runs BEFORE the freshness assertion so a stale
        # canary self-heals on the first passing run instead of death-spiraling
        # (stale → fail → no beat → still stale → fail …).
        run: |
          curl -fsS --max-time 20 -X POST \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "X-Canary-Sha: ${{ github.sha }}" \
            "$ORIGIN/api/admin/canary-beat" >/dev/null
          echo "canary heartbeat written"
      - name: Assert prior canary beat was fresh
        # Catches the case where canary-beat silently regressed between runs.
        # Smoke is hourly, so the PRIOR beat should be <70min old. This fires
        # after we've already written a fresh beat, so a failure here alerts
        # but doesn't prevent the next run from self-healing.
        # Skipped on manual dispatch (may fire off-cadence) and on push
        # events (deploy-prod already runs its own post-deploy smoke).
        if: github.event_name == 'schedule'
        run: |
          age=$(curl -fsS --max-time 20 \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            "$ORIGIN/api/admin/heartbeat-status" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(next((s.get('age_seconds') or 99999 for s in d.get('sources',[]) if s.get('source')=='canary'), 99999))")
          echo "prior canary age: ${age}s (just wrote a fresh beat above)"
          if [[ "$age" -ge 99999 ]]; then
            echo "canary heartbeat absent — first run after bootstrap, expected"
          elif [[ "$age" -gt 4200 ]]; then
            echo "::warning::canary was stale before this run (${age}s) — prior smoke may have failed silently"
          fi
      - name: Alert Discord on failure
        if: failure()
        run: |
          if [[ -z "${DISCORD_ALERT_WEBHOOK:-}" ]]; then
            echo "DISCORD_ALERT_WEBHOOK not set — skipping"
            exit 0
          fi
          payload=$(jq -cn \
            --arg c ":rotating_light: **SC-CPE: hourly smoke FAILED** on ${{ github.sha }} against $ORIGIN. See Actions run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}." \
            '{content: $c, username: "SC-CPE Smoke"}')
          curl -fsS --max-time 20 \
            -H "Content-Type: application/json" \
            -X POST -d "$payload" "$DISCORD_ALERT_WEBHOOK" >/dev/null
