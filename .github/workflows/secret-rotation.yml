name: secret-rotation

# Monthly secret rotation age check. Reads secrets_rotation_log.json
# (names + last-rotated dates, never values) and opens a GitHub issue
# when any secret exceeds its max_age_days.

on:
  schedule:
    - cron: "0 10 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check secret rotation ages
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check rotation ages
        id: check
        run: |
          overdue=""
          count=0
          today=$(date +%s)
          while IFS= read -r line; do
            name=$(echo "$line" | jq -r '.name')
            rotated=$(echo "$line" | jq -r '.rotated_at')
            max_days=$(echo "$line" | jq -r '.max_age_days')
            rotated_epoch=$(date -d "$rotated" +%s)
            age_days=$(( (today - rotated_epoch) / 86400 ))
            if [ "$age_days" -gt "$max_days" ]; then
              overdue="${overdue}- **${name}**: ${age_days} days old (max ${max_days})\n"
              count=$((count + 1))
            fi
          done < <(jq -c '.secrets[]' secrets_rotation_log.json)

          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            {
              echo "body<<EOFBODY"
              echo "The following secrets are overdue for rotation:"
              echo ""
              echo -e "$overdue"
              echo ""
              echo "Rotate each secret per the [RUNBOOK](docs/RUNBOOK.md), then update \`secrets_rotation_log.json\` with the new date."
              echo "EOFBODY"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing issue
        if: steps.check.outputs.count != '0'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --label "secret-rotation-overdue" --state open --limit 1 --json number -q '.[0].number // empty')
          echo "issue=$existing" >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        if: steps.check.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count="${{ steps.check.outputs.count }}"
          body="${{ steps.check.outputs.body }}"
          existing="${{ steps.existing.outputs.issue }}"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
            echo "Updated existing issue #$existing"
          else
            gh issue create \
              --title "[Security] Secret rotation overdue — ${count} secret(s)" \
              --body "$body" \
              --label "ops,security,secret-rotation-overdue"
            echo "Created new issue"
          fi
