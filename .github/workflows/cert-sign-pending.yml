name: cert-sign-pending

# Picks up certs rows in state='pending' and generates/signs/delivers them.
# Pending rows are created by:
#   - /api/me/{token}/cert-per-session/{stream_id}  (user-requested per-session)
#   - /api/admin/cert/{id}/reissue                  (admin-driven regeneration)
# Runs every 2h — latency target is "same day" for user requests; admin
# reissues can also be triggered manually via workflow_dispatch.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: cert-sign-pending
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pickup:
    name: Sign pending certs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      CERT_R2_BUCKET: sc-cpe-certs
      PDF_SIGNING_KEY_P12_BASE64: ${{ secrets.PDF_SIGNING_KEY_P12_BASE64 }}
      PDF_SIGNING_KEY_PASSWORD: ${{ secrets.PDF_SIGNING_KEY_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL: "Simply Cyber CPE <certs@signalplane.co>"
      ISSUER_NAME: "Simply Cyber LLC"
      VERIFY_BASE_URL: "https://sc-cpe-web.pages.dev/verify.html"
      DOWNLOAD_BASE_URL: "https://sc-cpe-web.pages.dev/api/download"
      PENDING_ONLY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/certs/requirements.txt

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-dejavu-core fonts-liberation

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/certs/requirements.txt

      - name: Run pending pickup
        working-directory: services/certs
        run: python generate.py --pending-only

  alert-on-failure:
    name: Discord alert on cert-sign-pending failure
    needs: pickup
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Notify Discord
        env:
          DISCORD_ALERT_WEBHOOK: ${{ secrets.DISCORD_ALERT_WEBHOOK }}
        run: |
          if [[ -z "${DISCORD_ALERT_WEBHOOK:-}" ]]; then
            echo "DISCORD_ALERT_WEBHOOK unset — skipping"; exit 0
          fi
          payload=$(jq -cn \
            --arg c ":warning: **SC-CPE cert-sign-pending FAILED** on ${{ github.sha }}. Pending per-session / reissue certs did not drain. See Actions run ${{ github.run_id }}." \
            '{content: $c, username: "SC-CPE Pending"}')
          curl -fsS --max-time 20 \
            -H "Content-Type: application/json" \
            -X POST -d "$payload" "$DISCORD_ALERT_WEBHOOK" >/dev/null
